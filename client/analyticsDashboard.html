<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="dashboard">
        <h1>Campaign Analytics Dashboard</h1>
        <div id="analytics">
            <h2>Open Rates</h2>
            <div id="openRates"></div>
            <h2>Click Rates</h2>
            <div id="clickRates"></div>
        </div>
    </div>
    <script>
        async function fetchAnalytics() {
            try {
                const response = await fetch('/api/analytics');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                displayAnalytics(data);
            } catch (error) {
                console.error('Error fetching analytics:', error);
                document.getElementById('analytics').innerHTML = '<p>Error loading analytics data.</p>';
            }
        }

        function displayAnalytics(data) {
            const openRatesDiv = document.getElementById('openRates');
            const clickRatesDiv = document.getElementById('clickRates');

            openRatesDiv.innerHTML = data.openRates.map(rate => `<p>${rate.campaign}: ${rate.rate}%</p>`).join('');
            clickRatesDiv.innerHTML = data.clickRates.map(rate => `<p>${rate.campaign}: ${rate.rate}%</p>`).join('');
        }

        document.addEventListener('DOMContentLoaded', fetchAnalytics);
    </script>
</body>
</html>
